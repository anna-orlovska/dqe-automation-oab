[pytest]
# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    smoke: mark test as smoke test (quick sanity checks)
    completeness: mark test as data completeness check
    quality: mark test as data quality check
    parquet_data: mark test as parquet data related
    example: mark test as example test

# Test output and reporting
addopts =
    -v
    --strict-markers
    --tb=short
    --html=html_report/report.html
    --self-contained-html

# Console output
console_output_style = progress

# Timeout for tests (optional, requires pytest-timeout)
# timeout = 300
