[pytest]
testpaths = PyTest DQ Framework/tests
python_files = test_*.py

markers =
    db: marks tests for db
    parquet: marks tests for Parquet files validations
    dq: marks tests for data quality checks

addopts = -v -s --strict-markers --tb=short
    --html=reports/report.html --self-contained-html

;log_cli = true
;log_cli_level = INFO