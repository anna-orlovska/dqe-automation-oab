[pytest]
# marks
markers =
    validate_csv: marks tests for csv file validation
    unmarked: marks tests that do not have explicit marks

# python_files
python_files = test_*.py

# addopts
addopts = -v -s --strict-markers --tb=short
    --html=reports/report.html --self-contained-html
    --junitxml=reports/report.xml
    --alluredir=reports/allure-results